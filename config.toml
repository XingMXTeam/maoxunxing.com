baseurl = "https://maoxunxing.com/"
title = "maoxunxing"
theme = "hugo-coder"
languagecode = "en"
defaultcontentlanguage = "en"
canonifyurls = false
timeout = 120000
googleAnalytics = "UA-199510588-1"
enableRobotsTXT = true
buildFuture = true
pygmentsstyle = "colorful"
pygmentscodefences = true
pygmentscodefencesguesssyntax = true

[pagination]
  pagerSize = 10
  path = "page"

[languages]
  [languages.zh-CN]
    weight = 2
    languageName = "CN"
    title = "毛毛星 Felix Mao - AI 创作者、前端工程师与独立开发者"
    [languages.zh-CN.params]
      icon = "1"
      description = "Felix Mao（毛毛星）的个人知识站，记录 AI 编程、AI 个体创业、前端工程、创作者工作流、系统思维和长期投资实践。"
      keywords = "毛毛星,Felix Mao,maoxunxing,AI创作者,AI个体创业,AI编程,独立开发,前端工程师,创作者工作流,个人知识系统,长期投资"
      custom_css = ["/css/main.css?v=20260616b", "/css/code-dark.css?v=20260616b", "/css/home.css?v=20260616b", "/css/prompts.css?v=20260616b", "/css/p0-fixes.css?v=20260616b", "/css/nav-hotfix.css?v=20260616b"]
      custom_js = ["/js/home-particle-noise-field.js?v=20260616b"]
  [languages.en]
    languageName = "EN"
    weight = 1
    title = "Felix Mao - AI Creator, Frontend Engineer & Indie Hacker"
    [languages.en.params]
      description = "Felix Mao's personal knowledge site about AI coding, AI indie hacking, frontend engineering, creator workflows, systems thinking, and long-term investing."
      keywords = "Felix Mao,maoxunxing,AI creator,AI indie hacking,AI coding,frontend engineer,indie hacker,creator workflows,personal knowledge system,long-term investing"
      custom_css = ["/css/main.css?v=20260616b", "/css/code-dark.css?v=20260616b", "/css/home.css?v=20260616b", "/css/prompts.css?v=20260616b", "/css/p0-fixes.css?v=20260616b", "/css/nav-hotfix.css?v=20260616b"]
      custom_js = ["/js/home-particle-noise-field.js?v=20260616b"]

[markup]
  [markup.highlight]
    style = "github"
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    endLevel = 3
    ordered = true
    startLevel = 2

