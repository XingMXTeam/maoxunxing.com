name: Deploy to Firebase Hosting on PR
"on": pull_request
jobs:
  build_and_preview:
    if: "${{ github.event.pull_request.head.repo.full_name == github.repository }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          submodules: true
          fetch-depth: 0
          lfs: true
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: "0.145.0"
          extended: true
      - name: Build
        env:
          ALGOLIA_ADMIN_KEY: ${{ secrets.ALGOLIA_ADMIN_KEY }}
        run: npm update && rm -rf public && hugo --minify && npm run index-and-send
      - name: Verify gallery output
        run: |
          test -f public/gallery/index.html
          photo_count=$(grep -o 'class="photo-item"' public/gallery/index.html | wc -l | tr -d ' ')
          echo "Gallery generated ${photo_count} photo items"
          test "${photo_count}" -ge 200
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_BLOG_6A0BF }}"
          projectId: blog-6a0bf
