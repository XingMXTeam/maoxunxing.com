# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
"on":
  push:
    branches:
      - master

concurrency:
  group: firebase-hosting-live
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          submodules: true
          fetch-depth: 0
          lfs: true
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: "0.145.0"
          extended: true
      - name: Build
        env:
          ALGOLIA_ADMIN_KEY: ${{ secrets.ALGOLIA_ADMIN_KEY }}
        run: npm update && rm -rf public && hugo --minify && npm run index-and-send
      - name: Verify gallery output
        run: |
          test -f public/gallery/index.html
          photo_count=$(grep -o 'class="photo-item"' public/gallery/index.html | wc -l | tr -d ' ')
          echo "Gallery generated ${photo_count} photo items"
          test "${photo_count}" -ge 200
      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BLOG_6A0BF }}
        run: |
          set +e
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-service-account.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-service-account.json"

          output=$(npx --yes firebase-tools deploy --only hosting --project blog-6a0bf --json 2>&1)
          status=$?
          echo "$output"

          if [ "$status" -eq 0 ]; then
            exit 0
          fi

          if echo "$output" | grep -q "current active version"; then
            echo "Firebase Hosting live channel already points to this version; treating this idempotent deploy as success."
            exit 0
          fi

          exit "$status"
