{{ define "title" }}
  {{ .Title }} · {{ .Site.Title }}
{{ end }}
{{ define "content" }}
<section class="container projects-page">
  {{ range $category, $items := .Params.projects }}
  <div class="project-category">
    <div class="project-category-bg">{{ $category }}</div>
    <div class="project-grid">
      {{ range $items }}
      <a class="project-card" href="{{ .link }}" target="_blank" rel="noopener">
        {{ with .icon }}<i class="{{ . }} project-icon"></i>{{ end }}
        <div class="project-info">
          <div class="project-name">{{ .name }}</div>
          <div class="project-desc">{{ .desc }}</div>
        </div>
      </a>
      {{ end }}
    </div>
  </div>
  {{ end }}
</section>
{{ end }}
