<li>
  <div class="post-item">
    <time class="post-date">{{ .Date.Format "2006-01-02" }}</time>
    <a class="post-title" href="{{ .RelPermalink }}">{{ .Title }}</a>
    {{ with .Page.Params.rating }}
      <span class="book-rating">{{ . }}/10</span>
    {{ end }}
    {{ with .Page.Params.description }}
      <p class="post-desc">{{ . }}</p>
    {{ end }}
  </div>
</li>
