<footer class="footer">
  <div class="footer-inner">
  {{ if not .Site.Params.hideCopyright }}
    <a
      rel="noopener"
      target="_blank"
      href="https://creativecommons.org/licenses/by-nc-sa/4.0/"
      style="color: inherit;"
      >CC BY-NC-SA 4.0</a
    >
    {{ now.Year }}
    &copy;
    {{ if .Site.Params.Author }}{{ .Site.Params.Author }}{{ end }}
  {{ end }}
  </div>
</footer>
