{{ if .Params.custom_toc }}
<div class="toc-wrapper">
  <div class="toc-anchor">
    <svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </div>
  <nav class="toc" id="toc">
    <nav id="TableOfContents">
      <ul>
        {{ range .Params.custom_toc }}
          <li>
            <a href="#{{ .title | anchorize }}">{{ .title }}</a>
            {{ if .children }}
              <ul>
                {{ range .children }}
                  <li><a href="#{{ .title | anchorize }}">{{ .title }}</a></li>
                {{ end }}
              </ul>
            {{ end }}
          </li>
        {{ end }}
      </ul>
    </nav>
  </nav>
</div>
{{ else if .TableOfContents }}
<div class="toc-wrapper">
  <div class="toc-anchor">
    <svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </div>
  <nav class="toc" id="toc">
    {{ .TableOfContents }}
  </nav>
</div>
{{ end }}
